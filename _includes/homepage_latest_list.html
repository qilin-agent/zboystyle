{% assign posts = include.posts | slice: 0, 4 %}
<div class="archive-list">
  {% for post in posts %}
  <a class="archive-item" href="{{ post.url | relative_url }}">
    <div class="archive-item-main">
      <strong class="archive-item-title">{{ post.index_title | default: post.title }}</strong>
    </div>
    <span class="archive-item-meta"><time datetime="{{ post.date | date: '%Y-%m-%d' }}">{{ post.date | date: "%Y-%m-%d" }}</time></span>
  </a>
  {% endfor %}
</div>
